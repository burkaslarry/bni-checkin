server.port=${PORT:10000}

# DeepSeek AI API Configuration
deepseek.api.key=sk-51a961f385664d50bc5201be73c4756a
deepseek.api.url=https://api.deepseek.com/v1/chat/completions

# Database: use profile 'supabase' for Supabase (see application-supabase.properties)
# Or set spring.datasource.* / spring.jpa.* here or via env (SUPABASE_DB_PASSWORD etc.)
# Local PostgreSQL (run init-database.sql first)
spring.datasource.url=jdbc:postgresql://localhost:5432/bni_checkin
spring.datasource.username=${USER:larrylo}
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.initialization-fail-timeout=-1

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

